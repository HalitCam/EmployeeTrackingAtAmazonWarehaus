services:
  backend-server:
    container_name: backend-server
    build: ./backend
    depends_on:
      - mongodb
      - redis
    environment:
      MONGO_URI: mongodb://mongo-server:27017/amazon-lager
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change_this_secret_in_production
    volumes:
      - uploads:/opt/amazon-lager/backend/uploads
    restart: always

  mongodb:
    container_name: mongo-server
    image: mongo
    ports:
      - 27017:27017
    volumes:
      - amazon-data:/data/db
    restart: always

  redis:
    container_name: redis-server
    image: redis
    ports:
      - 6379:6379
    restart: always

  client-server:
    container_name: client-server
    build:
      context: ./client
      args:
        REACT_APP_BASE_ENDPOINT: /api
    depends_on:
      - backend-server
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client-server
      - backend-server
    restart: always

volumes:
  amazon-data:
  uploads:
  